<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./styles/scam_style.css">
</head>
<body>
  <section class="main-section">
    <div class="main-wrap">
      <div class="cat-wrap">
        <img src="./img/scam-page/scam-cat.webp" alt="scam-cat" class="scam-cat">
      </div>
      <div class="text-wrap">
        <h1 class="scam-text">Victoria will you go on a date with me(Ilya)?&#x1F97A;&#x1F48D;</h1>
      </div>
      <div class="btns-wrap">
        <div class="btns-inner">
          <div class="btn-like"></div>
          <button class="btn-no">no</button>
        </div>
      </div>
      <div class="footer-text">"no" seems a bit shy</div>
    </div>
  </section>

  <section class="success-section hide">
    <div class="success-section-wrap">
      <div class="success-section-inner">
        <div class="doggy-wrap">
          <img src="./img/scam-page/happy_dog.gif" alt="happy dog" class="happy-dog">
        </div>
        <div class="text-wrap">
          <h1 class="scam-text">Yyaaaayyy!!!!!
            Can't wait for our date!&#10084;
          </h1>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@mojs/core"></script>
  <script src="./src/scam.js"></script>
</body>
</html>
